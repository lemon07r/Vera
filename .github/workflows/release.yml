name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download vendored grammars
        shell: bash
        run: bash scripts/bootstrap-vendored-grammars.sh

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} -p vera-cli

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }} -p vera-cli

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE_NAME="vera-${{ matrix.target }}"
          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/vera" "staging/${ARCHIVE_NAME}/"
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          ARCHIVE_NAME="vera-${{ matrix.target }}"
          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/vera.exe" "staging/${ARCHIVE_NAME}/"
          cd staging
          7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.zip" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        shell: bash
        working-directory: staging
        run: |
          sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: staging/vera-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify release versions
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:] if tag.startswith("v") else tag

          cargo = tomllib.loads(Path("Cargo.toml").read_text())["workspace"]["package"]["version"]
          npm = json.loads(Path("packages/npm-cli/package.json").read_text())["version"]
          pyproject = tomllib.loads(Path("packages/python-cli/pyproject.toml").read_text())["project"]["version"]

          versions = {
              "cargo": cargo,
              "npm": npm,
              "python": pyproject,
          }

          for name, value in versions.items():
              if value != expected:
                  raise SystemExit(f"{name} version {value} does not match tag {expected}")
          PY

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;

          # Generate combined checksums file
          cd release
          cat *.sha256 > checksums-sha256.txt
          ls -la

      - name: Generate release manifest
        shell: bash
        run: |
          python3 scripts/generate_release_manifest.py release "${GITHUB_REF_NAME}" "${{ github.repository }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

      - name: Set up Node.js
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@vera-ai'

      - name: Publish npm wrapper
        if: ${{ env.NPM_TOKEN != '' }}
        shell: bash
        working-directory: packages/npm-cli
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public

      - name: Set up Python
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish Python wrapper
        if: ${{ env.PYPI_API_TOKEN != '' }}
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build packages/python-cli
          python -m twine upload --non-interactive packages/python-cli/dist/*
