name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          fi
          cargo generate-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up sccache
        if: ${{ !matrix.use_cross }}
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Download vendored grammars
        shell: bash
        run: bash scripts/bootstrap-vendored-grammars.sh

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Install musl tools
        if: matrix.musl
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          # esaxx-rs (tokenizers dep) needs a C++ compiler for musl target.
          # musl-tools only provides musl-gcc; create a musl-g++ wrapper that
          # invokes g++ with the musl libc spec so cc-rs can find it.
          sudo ln -s /usr/bin/g++ /usr/local/bin/x86_64-linux-musl-g++
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "CXX_x86_64_unknown_linux_musl=g++" >> "$GITHUB_ENV"
          # sqlite-vec uses BSD u_int8_t/u_int16_t/u_int64_t types unavailable in musl.
          # Define them via CFLAGS so the C compiler can resolve them.
          echo "CFLAGS_x86_64_unknown_linux_musl=-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t" >> "$GITHUB_ENV"

      - name: Set MSVC CRT flags
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CFLAGS=/MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS=/MD" >> "$GITHUB_ENV"

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} -p vera-cli

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }} -p vera-cli

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE_NAME="vera-${{ matrix.target }}"
          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/vera" "staging/${ARCHIVE_NAME}/"
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          ARCHIVE_NAME="vera-${{ matrix.target }}"
          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/vera.exe" "staging/${ARCHIVE_NAME}/"
          cd staging
          7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: staging/vera-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" packages/npm-cli/package.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" packages/python-cli/pyproject.toml

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate release manifest
        shell: bash
        run: |
          python3 scripts/generate_release_manifest.py release "${GITHUB_REF_NAME}" "${{ github.repository }}"

      - name: Determine if latest release
        id: latest
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          HIGHEST=$(git tag --sort=-v:refname | head -1)
          if [ "$TAG" = "$HIGHEST" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag by version order (the one just below current)
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          # If grep matched only the tag itself, there's no previous
          if [ "$PREV_TAG" = "$TAG" ]; then PREV_TAG=""; fi
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          BODY=""
          # Collect commits by type
          for type_label in "feat:Features" "fix:Bug Fixes" "perf:Performance"; do
            prefix="${type_label%%:*}"
            heading="${type_label##*:}"
            commits=$(git log --oneline "$RANGE" --grep="^${prefix}" --format="- %s" 2>/dev/null | sed "s/^- ${prefix}(\([^)]*\)): /- **\1:** /;s/^- ${prefix}: /- /")
            if [ -n "$commits" ]; then
              BODY="${BODY}### ${heading}\n${commits}\n\n"
            fi
          done

          # Other notable commits (chore, refactor, docs — skip pure docs-only releases)
          other=$(git log --oneline "$RANGE" --format="%s" 2>/dev/null | grep -vE "^(feat|fix|perf)" | grep -E "^(refactor|chore|build|ci)" | sed 's/^\([a-z]*\)(\([^)]*\)): /- **\2:** /;s/^\([a-z]*\): /- /' || true)
          if [ -n "$other" ]; then
            BODY="${BODY}### Other Changes\n${other}\n\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="Maintenance release — see commit history for details.\n"
          fi

          BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"

          # Write to file for the release step
          mkdir -p release
          echo -e "$BODY" > release/CHANGELOG.md
          cat release/CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/release-manifest.json
          body_path: release/CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          make_latest: ${{ steps.latest.outputs.is_latest }}

      - name: Set up Node.js
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@vera-ai'

      - name: Publish npm wrapper
        if: ${{ env.NPM_TOKEN != '' }}
        shell: bash
        working-directory: packages/npm-cli
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public

      - name: Set up Python
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish Python wrapper
        if: ${{ env.PYPI_API_TOKEN != '' }}
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build packages/python-cli
          python -m twine upload --non-interactive packages/python-cli/dist/*
