[advisories]
ignore = [
    # paste is unmaintained but pulled in transitively by tokenizers: not actionable
    "RUSTSEC-2024-0436",
    # number_prefix is unmaintained but pulled in transitively by model2vec-rs via hf-hub/indicatif.
    # Keep this scoped to the Potion backend dependency until upstream removes the edge.
    "RUSTSEC-2025-0119",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
