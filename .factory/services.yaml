commands:
  build: cargo build
  build-release: cargo build --release
  build-local: cargo build --release --features local
  test: cargo test
  test-local: cargo test --features local
  test-verbose: cargo test -- --nocapture
  clippy: cargo clippy -- -D warnings
  fmt: cargo fmt --check
  fmt-fix: cargo fmt
  bench: cargo test --test bench -- --nocapture
  eval-run: cargo run --bin vera-eval -- run
  eval-run-json: cargo run --bin vera-eval -- run --json-only
  eval-stability: cargo run --bin vera-eval -- stability
  eval-verify-corpus: cargo run --bin vera-eval -- verify-corpus
  eval-setup-corpus: bash eval/setup-corpus.sh

services:
  # MCP server uses stdio transport (JSON-RPC over stdin/stdout), not TCP.
  # It is typically launched by an MCP client (e.g., Claude Desktop, VS Code).
  # No port, no HTTP endpoint, no health check applicable.
  # To test manually: echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.1.0"}}}' | cargo run -- mcp
